<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🅿️ Parkeerplaats Deler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parkeerplaats">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root {
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--card:#1e2d45;
  --border:#2a3a55;--text:#e8f0fe;--text2:#8ba3c7;--text3:#556b8a;
  --accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--green2:#16a34a;
  --red:#ef4444;--red2:#dc2626;--blue2:#0ea5e9;
  --gray:#374151;--gray2:#4b5563;--yellow:#f59e0b;
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;font-size:16px}
.screen{display:none;flex-direction:column;height:100dvh}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{background:linear-gradient(160deg,#0a0f1e 0%,#0f1f3d 50%,#0a1628 100%);align-items:center;justify-content:center;padding:24px}
.login-logo{font-size:64px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-size:30px;font-weight:700;margin-bottom:4px;text-align:center}
.login-sub{font-size:16px;color:var(--text2);margin-bottom:32px;text-align:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--shadow)}
.form-label{font-size:14px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block}
.form-select,.form-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:18px;padding:16px;margin-bottom:20px;outline:none;transition:border-color 0.2s;appearance:none}
.form-select:focus,.form-input:focus{border-color:var(--accent)}
.pin-input{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:32px;padding:16px;margin-bottom:20px;outline:none;text-align:center;letter-spacing:12px;transition:border-color 0.2s}
.pin-input:focus{border-color:var(--accent)}
.login-error{background:rgba(239,68,68,0.15);border:1px solid var(--red);border-radius:var(--radius-sm);color:#fca5a5;font-size:15px;padding:12px;margin-bottom:16px;text-align:center;display:none}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);color:white;font-family:var(--font);font-size:18px;font-weight:600;padding:18px;cursor:pointer;transition:all 0.15s;user-select:none}
.btn:active{opacity:0.85;transform:scale(0.98)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.green{background:var(--green2)}
.btn.red{background:var(--red2)}
.btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn.sm{font-size:14px;padding:10px 16px;width:auto}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.topbar-title{font-size:18px;font-weight:700}
.topbar-actions{display:flex;gap:8px}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:18px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* WEEK NAV BAR */
.week-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.week-nav-label{font-size:14px;font-weight:600;color:var(--text2);flex:1;text-align:center}
.week-nav-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:16px;font-weight:700;padding:8px 16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.week-nav-btn:active{background:var(--accent);border-color:var(--accent)}
.week-nav-btn.today{background:var(--accent);border-color:var(--accent);color:white;font-size:13px}

/* LEGEND */
.legend{display:flex;gap:16px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* GRID */
.grid-container{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.grid-container::-webkit-scrollbar{width:4px;height:4px}
.grid-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.grid-wrapper{display:grid;min-width:max-content}
.grid-spot-label{position:sticky;left:0;background:var(--bg2);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 12px;min-width:110px;z-index:8;display:flex;flex-direction:column;justify-content:center}
.grid-spot-label.my-label{background:rgba(59,130,246,0.07);border-left:3px solid var(--accent)}
.avail-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle;flex-shrink:0}
.spot-number{font-size:15px;font-weight:700;color:var(--text);font-family:var(--mono)}
.spot-owner{font-size:11px;color:var(--text3);margin-top:2px}
.grid-day-header{position:sticky;top:0;background:var(--bg3);border-bottom:2px solid var(--accent);border-right:1px solid var(--border);padding:7px 4px;text-align:center;font-size:13px;font-weight:700;color:var(--accent2);z-index:10;min-width:52px;white-space:nowrap;letter-spacing:0.02em;height:32px}
.grid-day-header.corner-day{position:sticky;left:0;top:0;z-index:12;background:var(--bg2);min-width:110px;border-right:1px solid var(--border)}
.grid-time-header{position:sticky;top:32px;background:var(--bg2);border-bottom:1px solid var(--border);border-right:1px solid rgba(255,255,255,0.05);padding:6px 4px;text-align:center;font-size:11px;font-family:var(--mono);color:var(--text3);z-index:9;min-width:52px}
.grid-time-header.hour{color:var(--text2);font-weight:600;border-right:1px solid var(--border)}
.grid-time-header.corner{position:sticky;left:0;top:32px;z-index:11;background:var(--bg2);border-right:1px solid var(--border);min-width:110px}
.grid-cell{border-right:1px solid rgba(255,255,255,0.04);border-bottom:1px solid var(--border);min-width:52px;height:52px;cursor:pointer;position:relative;background:var(--gray)}
.grid-cell:hover{filter:brightness(1.2)}
.grid-cell.hour-start{border-right:1px solid var(--border)}
.grid-cell.available{background:var(--green2)}
.grid-cell.reserved{background:var(--blue2)}
.grid-cell.my-spot{background:var(--gray2)}
.grid-cell.past{opacity:0.35;cursor:default;pointer-events:none}
.grid-cell.now-marker{border-left:2px solid var(--yellow)!important}
.cell-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:600;color:rgba(255,255,255,0.95);white-space:nowrap;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.6)}

/* BOTTOM SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px)}
.overlay.active{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:0 20px 36px;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;overflow-y:auto}
.bottom-sheet.active{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:6px}
.sheet-sub{font-size:14px;color:var(--text2);margin-bottom:20px}
.sheet-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:15px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2)}
.info-value{font-weight:600}
.time-picker-row{display:flex;gap:12px;margin-bottom:16px}
.time-picker-group{flex:1}
.time-select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:15px;padding:12px;outline:none;appearance:none;text-align:center}
.time-select:focus{border-color:var(--accent)}

/* ADMIN */
#adminScreen{background:var(--bg)}
.admin-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.admin-tab{padding:14px 16px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.admin-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.admin-content{flex:1;overflow-y:auto;padding:16px}
.admin-panel{display:none}
.admin-panel.active{display:block}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.list-item-info{flex:1}
.list-item-title{font-size:16px;font-weight:600}
.list-item-sub{font-size:13px;color:var(--text2);margin-top:3px}
.list-item-actions{display:flex;gap:8px}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;margin-left:6px}
.badge.admin{background:rgba(59,130,246,0.2);color:var(--accent2)}
.badge.super{background:rgba(245,158,11,0.2);color:var(--yellow)}
.badge.inactive{background:rgba(239,68,68,0.15);color:#fca5a5}

/* MODAL */
.modal{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)}
.modal.active{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.modal-title{font-size:20px;font-weight:700;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:15px;font-weight:500;z-index:500;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:calc(100vw - 32px);box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:#86efac}
.toast.error{border-color:var(--red);color:#fca5a5}
.toast.info{border-color:var(--accent);color:var(--accent2)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">🅿️</div>
  <div class="login-title">Parkeerplaats Deler</div>
  <div class="login-sub">Jouw buurt, jouw plek</div>
  <div class="login-card">
    <label class="form-label">Jouw naam</label>
    <select class="form-select" id="loginName">
      <option value="">— Laden... —</option>
    </select>
    <label class="form-label">PIN</label>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="····" autocomplete="off">
    <div class="login-error" id="loginError"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()" disabled>Inloggen</button>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
  <div class="topbar">
    <div class="topbar-title">🅿️ Parkeerplaats Deler</div>
    <div class="topbar-actions">
      <div class="icon-btn" id="adminBtn" onclick="showAdmin()" style="display:none">⚙️</div>
      <div class="icon-btn" onclick="doLogout()">🚪</div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--gray2)"></div>Bezet</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green2)"></div>Beschikbaar</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue2)"></div>Gereserveerd</div>
  </div>
  <div class="week-nav">
    <button class="week-nav-btn" onclick="shiftWindow(-7)">◀</button>
    <div class="week-nav-label" id="weekNavLabel" onclick="document.getElementById('datePicker').showPicker()" style="cursor:pointer">
      <span id="weekNavText"></span> 📅
      <input type="date" id="datePicker" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none" onchange="jumpToDate(this.value)">
    </div>
    <button class="week-nav-btn today" onclick="goToToday()">Vandaag</button>
    <button class="week-nav-btn" onclick="shiftWindow(7)">▶</button>
  </div>
  <div class="grid-container" id="gridContainer">
    <div class="loading"><div class="spinner"></div><div style="color:var(--text2)">Laden...</div></div>
  </div>
</div>

<!-- ADMIN -->
<div class="screen" id="adminScreen">
  <div class="topbar">
    <div class="topbar-title">⚙️ Beheer</div>
    <div class="topbar-actions"><div class="icon-btn" onclick="showMain()">✕</div></div>
  </div>
  <div class="admin-tabs">
    <div class="admin-tab active" onclick="switchAdminTab('users')">Gebruikers</div>
    <div class="admin-tab" onclick="switchAdminTab('spots')">Parkeerplaatsen</div>
    <div class="admin-tab" onclick="switchAdminTab('config')">Instellingen</div>
  </div>
  <div class="admin-content">
    <div class="admin-panel active" id="adminUsers"></div>
    <div class="admin-panel" id="adminSpots"></div>
    <div class="admin-panel" id="adminConfig"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<!-- USER MODAL -->
<div class="modal" id="userModal">
  <div class="modal-card">
    <div class="modal-title" id="userModalTitle">Gebruiker toevoegen</div>
    <input type="hidden" id="editUserId">
    <label class="form-label">Naam</label>
    <input class="form-input" id="editUserName" placeholder="Voornaam">
    <label class="form-label">PIN (4 cijfers)</label>
    <input class="form-input" id="editUserPin" placeholder="1234" maxlength="4" inputmode="numeric">
    <label class="form-label">Rol</label>
    <select class="form-select" id="editUserRole" style="margin-bottom:0">
      <option value="neighbor">Buur</option>
      <option value="admin">Beheerder</option>
    </select>
    <div class="modal-actions">
      <button class="btn outline" onclick="closeModal('userModal')">Annuleren</button>
      <button class="btn" onclick="saveUser()">Opslaan</button>
    </div>
  </div>
</div>

<!-- SPOT MODAL -->
<div class="modal" id="spotModal">
  <div class="modal-card">
    <div class="modal-title" id="spotModalTitle">Parkeerplaats toevoegen</div>
    <input type="hidden" id="editSpotId">
    <label class="form-label">Nummer</label>
    <input class="form-input" id="editSpotNumber" placeholder="250" inputmode="numeric">
    <label class="form-label">Eigenaar(s)</label>
    <select class="form-select" id="editSpotOwners" multiple style="height:130px;margin-bottom:4px"></select>
    <div style="font-size:12px;color:var(--text3);margin-bottom:0">Houd Ctrl/Cmd ingedrukt voor meerdere eigenaren</div>
    <div class="modal-actions">
      <button class="btn outline" onclick="closeModal('spotModal')">Annuleren</button>
      <button class="btn" onclick="saveSpot()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUWzsQjgYfwTMISXBaR5x0vT1ibEHDQUE",
  authDomain: "parkeerplaats-deler.firebaseapp.com",
  databaseURL: "https://parkeerplaats-deler-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "parkeerplaats-deler",
  storageBucket: "parkeerplaats-deler.firebasestorage.app",
  messagingSenderId: "996896385395",
  appId: "1:996896385395:web:92dee957d0fe3a91b03d06"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let state = {
  user: null,
  users: {}, spots: {}, availability: {}, reservations: {},
  config: {
    whatsappLink: 'https://chat.whatsapp.com/IIJtqClPHrk2oRKdrJxlnj?mode=gi_t',
    appUrl: 'https://lfloreza.github.io/parking'
  },
  selectedDate: new Date()
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDT(dt) { return dt.toLocaleString('nl-NL',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function fmtDate(dt) { return dt.toISOString().split('T')[0]; }
function g(id) { return document.getElementById(id)?.value || ''; }
window.closeModal = id => document.getElementById(id).classList.remove('active');

// ── INIT ──
async function init() {
  try {
    const snap = await get(ref(db));
    if (snap.exists()) {
      const d = snap.val();
      state.users = d.users || {};
      state.spots = d.spots || {};
      state.availability = Object.fromEntries(Object.entries(d.availability || {}).filter(([,a]) => a.status === 'available'));
      state.reservations = Object.fromEntries(Object.entries(d.reservations || {}).filter(([,r]) => r.status === 'active'));
      if (d.config) state.config = { ...state.config, ...d.config };
    } else {
      await set(ref(db,'users/u_super'), {name:'Lucas',pin:'1234',role:'super',active:true});
      await set(ref(db,'config'), state.config);
      state.users = {u_super:{name:'Lucas',pin:'1234',role:'super',active:true}};
    }
  } catch(e) { console.error('Firebase error:', e); }

  populateLoginSelect();

  const saved = localStorage.getItem('parkUser');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      if (state.users[u.id]?.active) { state.user = u; showMain(); return; }
    } catch(e) {}
    localStorage.removeItem('parkUser');
  }
  showScreen('loginScreen');
}

function populateLoginSelect() {
  const sel = document.getElementById('loginName');
  sel.innerHTML = '<option value="">— Kies je naam —</option>';
  Object.entries(state.users)
    .filter(([,u]) => u.active)
    .sort((a,b) => a[1].name.localeCompare(b[1].name))
    .forEach(([id,u]) => {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = u.name;
      sel.appendChild(opt);
    });
}

// ── LOGIN ──
const pinInput = document.getElementById('pinInput');
const loginBtn = document.getElementById('loginBtn');

function checkLoginReady() {
  loginBtn.disabled = pinInput.value.length !== 4 || !document.getElementById('loginName').value;
}
pinInput.addEventListener('input', checkLoginReady);
document.getElementById('loginName').addEventListener('change', checkLoginReady);

window.doLogin = function() {
  const id = g('loginName');
  const pin = pinInput.value;
  const err = document.getElementById('loginError');
  err.style.display = 'none';
  const u = state.users[id];
  if (!u || String(u.pin) !== pin) {
    err.textContent = 'Ongeldige naam of PIN. Probeer opnieuw.';
    err.style.display = 'block';
    pinInput.value = ''; checkLoginReady();
    return;
  }
  state.user = {id, name:u.name, role:u.role};
  localStorage.setItem('parkUser', JSON.stringify(state.user));
  showMain();
};

window.doLogout = function() {
  localStorage.removeItem('parkUser');
  state.user = null;
  pinInput.value = '';
  document.getElementById('loginName').value = '';
  loginBtn.disabled = true;
  populateLoginSelect();
  showScreen('loginScreen');
};

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.showMain = function() {
  showScreen('mainScreen');
  document.getElementById('adminBtn').style.display =
    (state.user?.role==='admin'||state.user?.role==='super') ? 'flex' : 'none';
  if (!state._windowStart) initWindow();
  renderGrid();
};

window.showAdmin = function() {
  showScreen('adminScreen');
  renderAdminUsers(); renderAdminSpots(); renderAdminConfig();
};

// ── DATE NAV ──
// Window = 7 days rendered at a time
// state._windowStart = date of first day shown (midnight)
// Navigable range: 2 days back to 60 days forward from today

function getToday() { const d=new Date(); d.setHours(0,0,0,0); return d; }

function initWindow() {
  const d = getToday(); d.setDate(d.getDate()-2); // start 2 days back
  state._windowStart = d;
}

window.shiftWindow = function(days) {
  const today = getToday();
  const minDate = new Date(today); minDate.setDate(today.getDate()-2);
  const maxDate = new Date(today); maxDate.setDate(today.getDate()+53); // 60-7
  const next = new Date(state._windowStart);
  next.setDate(next.getDate()+days);
  if (next < minDate) next.setTime(minDate.getTime());
  if (next > maxDate) next.setTime(maxDate.getTime());
  state._windowStart = next;
  renderGrid();
};

window.goToToday = function() {
  const d = getToday(); d.setDate(d.getDate()-2);
  state._windowStart = d;
  renderGrid();
};

window.jumpToDate = function(dateStr) {
  if (!dateStr) return;
  const picked = new Date(dateStr + 'T00:00:00');
  const today = getToday();
  const minDate = new Date(today); minDate.setDate(today.getDate()-2);
  const maxDate = new Date(today); maxDate.setDate(today.getDate()+53);
  if (picked < minDate) picked.setTime(minDate.getTime());
  if (picked > maxDate) picked.setTime(maxDate.getTime());
  state._windowStart = picked;
  renderGrid();
};

function updateWeekLabel() {
  const start = new Date(state._windowStart);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const nlMonths=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const fmt = d => `${d.getDate()} ${nlMonths[d.getMonth()]}`;
  const el=document.getElementById('weekNavText'); if(el) el.textContent=`${fmt(start)} – ${fmt(end)}`;
}

// ── GRID ──
function renderGrid() {
  updateWeekLabel();
  const container = document.getElementById('gridContainer');
  container.innerHTML = '';
  const spots = Object.entries(state.spots).sort((a,b)=>Number(a[1].number)-Number(b[1].number));
  if (!spots.length) {
    container.innerHTML = '<div class="empty"><div style="font-size:40px;margin-bottom:12px">🅿️</div><div style="font-size:16px">Geen parkeerplaatsen.<br>Voeg er een toe via Beheer.</div></div>';
    return;
  }

  const SLOT=60, DAYS=7, COLS=DAYS*24; // 7 days × 24 slots
  const startDate = new Date(state._windowStart);
  const now = new Date();
  const nlDays=['zo','ma','di','wo','do','vr','za'];
  const nlMonths=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

  const wrapper = document.createElement('div');
  wrapper.className = 'grid-wrapper';
  wrapper.style.gridTemplateColumns = `110px repeat(${COLS},52px)`;

  // Row 1: Day headers
  const dayCorner = document.createElement('div');
  dayCorner.className = 'grid-day-header corner-day';
  dayCorner.style.cssText = 'grid-row:1;grid-column:1';
  wrapper.appendChild(dayCorner);

  for (let i=0; i<COLS; i++) {
    const t = new Date(startDate); t.setMinutes(i*SLOT);
    const th = document.createElement('div');
    th.className = 'grid-day-header';
    th.style.cssText = `grid-row:1;grid-column:${i+2}`;
    if (t.getHours()===0 && t.getMinutes()===0) {
      const isToday = t.toDateString()===now.toDateString();
      th.textContent = isToday ? `📍 ${nlDays[t.getDay()]} ${t.getDate()} ${nlMonths[t.getMonth()]}` : `${nlDays[t.getDay()]} ${t.getDate()} ${nlMonths[t.getMonth()]}`;
      th.style.color = isToday ? 'var(--yellow)' : '';
      th.style.borderLeft = '2px solid var(--border)';
    }
    wrapper.appendChild(th);
  }

  // Row 2: Time headers
  const corner = document.createElement('div');
  corner.className = 'grid-time-header corner';
  corner.style.cssText = 'grid-row:2;grid-column:1';
  wrapper.appendChild(corner);

  for (let i=0; i<COLS; i++) {
    const t = new Date(startDate); t.setMinutes(i*SLOT);
    const th = document.createElement('div');
    th.className = 'grid-time-header'+(t.getMinutes()===0?' hour':'');
    th.style.cssText = `grid-row:2;grid-column:${i+2}`;
    th.textContent = `${String(t.getHours()).padStart(2,'0')}:00`;
    wrapper.appendChild(th);
  }

  // Spot rows
  spots.forEach(([spotId,spot],si) => {
    const mySpot = isMySpot(spot);
    const label = document.createElement('div');
    label.className = 'grid-spot-label' + (mySpot ? ' my-label' : '');
    label.style.cssText = `grid-row:${si+3};grid-column:1`;
    // Check if spot has any future availability
    const now2 = new Date();
    const hasFutureAvail = Object.values(state.availability).some(a => {
      if (a.spotId !== spotId || a.status !== 'available' || new Date(a.end) <= now2) return false;
      // Check if any part of this window is NOT fully covered by reservations
      const aS = new Date(a.start) < now2 ? now2 : new Date(a.start);
      const aE = new Date(a.end);
      // Get all active reservations for this spot overlapping this window
      const reses = Object.values(state.reservations).filter(r =>
        r.spotId === spotId && r.status === 'active' &&
        new Date(r.start) < aE && new Date(r.end) > aS
      );
      if (!reses.length) return true; // fully free
      // Check if reservations cover the entire window
      // Sort by start, see if there's any gap
      const sorted = reses.sort((a,b) => new Date(a.start)-new Date(b.start));
      let covered = new Date(aS);
      for (const r of sorted) {
        if (new Date(r.start) > covered) return true; // gap found
        if (new Date(r.end) > covered) covered = new Date(r.end);
      }
      return covered < aE; // gap at the end
    });
    const dot = hasFutureAvail ? '<span class="avail-dot" title="Heeft beschikbaarheid"></span>' : '';
    label.innerHTML = `<div class="spot-number" style="display:flex;align-items:center">${spot.number}${dot}</div><div class="spot-owner">${getOwnerNames(spot)}</div>`;
    wrapper.appendChild(label);

    for (let i=0; i<COLS; i++) {
      const slotStart = new Date(startDate); slotStart.setMinutes(i*SLOT);
      const slotEnd = new Date(slotStart); slotEnd.setMinutes(slotEnd.getMinutes()+SLOT);
      const cell = document.createElement('div');
      cell.className = 'grid-cell hour-start';
      cell.style.cssText = `grid-row:${si+3};grid-column:${i+2}`;
      if (slotEnd<=now) cell.classList.add('past');

      const availEntry = getAvailEntry(spotId,slotStart,slotEnd);
      const resEntry = getResEntry(spotId,slotStart,slotEnd);

      if (resEntry) {
        cell.classList.add('reserved');
        const ru = state.users[resEntry[1].reservedBy];
        if (ru) { const l=document.createElement('div'); l.className='cell-label'; l.textContent=ru.name; cell.appendChild(l); }
      } else if (availEntry) {
        cell.classList.add('available');
      } else if (mySpot) {
        cell.classList.add('my-spot');
      }

      if (slotStart<=now && now<slotEnd) cell.classList.add('now-marker');
      if (!cell.classList.contains('past')) {
        cell.onclick = () => openCellSheet(spotId, spot, slotStart, availEntry, resEntry);
      }
      wrapper.appendChild(cell);
    }
  });

  container.appendChild(wrapper);
  // Scroll to current time if today is visible
  const todayInWindow = now >= startDate && now < new Date(startDate.getTime() + DAYS*24*60*60*1000);
  if (todayInWindow) {
    const nowSlot = Math.floor((now-startDate)/(SLOT*60000));
    setTimeout(()=>{ container.scrollLeft = Math.max(0,(nowSlot-2)*52); },50);
  } else {
    setTimeout(()=>{ container.scrollLeft = 0; },50);
  }
}

function getOwnerNames(spot) {
  if (!spot.ownerIds) return '—';
  return spot.ownerIds.split(',').map(id=>state.users[id.trim()]?.name||'?').join(', ')||'—';
}
function isMySpot(spot) {
  return !!(state.user && spot.ownerIds && spot.ownerIds.split(',').map(s=>s.trim()).includes(state.user.id));
}
function getAvailEntry(spotId,start,end) {
  return Object.entries(state.availability).find(([,a])=>
    a.spotId===spotId && a.status==='available' &&
    new Date(a.start)<=start && new Date(a.end)>=end
  )||null;
}
function getResEntry(spotId,start,end) {
  return Object.entries(state.reservations).find(([,r])=>
    r.spotId===spotId && r.status==='active' &&
    new Date(r.start)<end && new Date(r.end)>start
  )||null;
}

// ── CELL SHEET ──
function openCellSheet(spotId, spot, slotTime, availEntry, resEntry) {
  const mySpot = isMySpot(spot);
  const resId = resEntry?.[0], resData = resEntry?.[1];
  const availId = availEntry?.[0], availData = availEntry?.[1];
  let html = `<div class="sheet-title">🅿️ Parkeerplaats ${spot.number}</div>`;
  html += `<div class="sheet-sub">Eigenaar: ${getOwnerNames(spot)}</div>`;

  if (resData) {
    const ru = state.users[resData.reservedBy];
    html += `<div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:var(--blue2)">🔵 Gereserveerd</span></div>`;
    html += `<div class="info-row"><span class="info-label">Door</span><span class="info-value">${ru?.name||'?'}</span></div>`;
    html += `<div class="info-row"><span class="info-label">Van</span><span class="info-value">${fmtDT(new Date(resData.start))}</span></div>`;
    html += `<div class="info-row"><span class="info-label">Tot</span><span class="info-value">${fmtDT(new Date(resData.end))}</span></div>`;
    html += `<div class="sheet-actions">`;
    // Only reserver or spot owner can cancel — but owner cannot override/re-reserve
    if (mySpot || resData.reservedBy===state.user.id) {
      html += `<button class="btn red" onclick="cancelReservation('${resId}','${spot.number}','${resData.start}','${resData.end}')">❌ Reservering annuleren</button>`;
    }
    html += `</div>`;
  } else if (availData) {
    html += `<div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:var(--green)">🟢 Beschikbaar</span></div>`;
    html += `<div class="info-row"><span class="info-label">Van</span><span class="info-value">${fmtDT(new Date(availData.start))}</span></div>`;
    html += `<div class="info-row"><span class="info-label">Tot</span><span class="info-value">${fmtDT(new Date(availData.end))}</span></div>`;
    html += `<div class="sheet-actions">`;
    if (!mySpot) html += `<button class="btn green" onclick="showReserveForm('${spotId}','${spot.number}','${availId}','${availData.start}','${availData.end}','${slotTime.toISOString()}')">✅ Reserveren</button>`;
    if (mySpot) html += `<button class="btn red" onclick="cancelAvailability('${availId}','${spot.number}','${availData.start}','${availData.end}')">❌ Beschikbaarheid annuleren</button>`;
    html += `</div>`;
  } else {
    html += `<div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:var(--text2)">⬜ Bezet</span></div>`;
    if (mySpot) html += `<div class="sheet-actions"><button class="btn green" onclick="showAvailForm('${spotId}','${spot.number}','${slotTime.toISOString()}')">🟢 Beschikbaar stellen</button></div>`;
  }
  openSheet(html);
}

// ── AVAIL FORM ──
window.showAvailForm = function(spotId,spotNum,fromISO) {
  const from = new Date(fromISO), opts = timeOpts();
  let html = `<div class="sheet-title">🟢 Beschikbaar stellen</div><div class="sheet-sub">Parkeerplaats ${spotNum}</div>`;
  html += `<div class="time-picker-row"><div class="time-picker-group"><label class="form-label">Van datum</label><input type="date" class="time-select" id="aFromDate" value="${fmtDate(from)}"></div><div class="time-picker-group"><label class="form-label">Van tijd</label><select class="time-select" id="aFromTime">${opts}</select></div></div>`;
  html += `<div class="time-picker-row"><div class="time-picker-group"><label class="form-label">Tot datum</label><input type="date" class="time-select" id="aToDate" value="${fmtDate(from)}"></div><div class="time-picker-group"><label class="form-label">Tot tijd</label><select class="time-select" id="aToTime">${opts}</select></div></div>`;
  html += `<div class="sheet-actions"><button class="btn green" id="confirmAvailBtn" onclick="confirmAvail('${spotId}','${spotNum}')">✅ Bevestigen & Verstuur WhatsApp</button><button class="btn outline" onclick="closeSheet()">Annuleren</button></div>`;
  openSheet(html);
  from.setMinutes(0,0,0); setVal('aFromTime',roundSlot(from));
  const to=new Date(from); to.setHours(to.getHours()+2);
  setVal('aToTime',roundSlot(to));
};

window.confirmAvail = async function(spotId,spotNum) {
  const start=new Date(`${g('aFromDate')}T${g('aFromTime')}:00`);
  const end=new Date(`${g('aToDate')}T${g('aToTime')}:00`);
  if (end<=start){showToast('Eindtijd moet na starttijd zijn','error');return;}
  setBtnLoading('confirmAvailBtn', true);
  const id='av_'+uid();
  const data={spotId,start:start.toISOString(),end:end.toISOString(),createdBy:state.user.id,status:'available'};
  try {
    await set(ref(db,`availability/${id}`),data);
    state.availability[id]=data;
    closeSheet(); renderGrid();
    showToast('✅ Beschikbaarheid opgeslagen!','success');
    sendWA('available',spotNum,start,end);
  } catch(e) {
    showToast('Fout bij opslaan. Probeer opnieuw.','error');
    setBtnLoading('confirmAvailBtn', false);
  }
};

// ── RESERVE FORM ──
window.showReserveForm = function(spotId,spotNum,availId,availStart,availEnd,slotISO) {
  const aS=new Date(availStart), aE=new Date(availEnd);

  // Pre-fill start from tapped slot, clamped strictly inside availability window
  const tapped = slotISO ? new Date(slotISO) : new Date(aS);
  // Clamp to [aS, aE - 1hour]
  const maxStart = new Date(aE); maxStart.setHours(maxStart.getHours()-1);
  let preStart = tapped < aS ? new Date(aS) : tapped > maxStart ? new Date(maxStart) : new Date(tapped);
  // Round to hour
  preStart.setMinutes(0,0,0);
  if (preStart < aS) preStart = new Date(aS);

  // Pre-fill end: 1 hour after preStart, clamped to aE
  let preEnd = new Date(preStart); preEnd.setHours(preEnd.getHours()+1);
  if (preEnd > aE) preEnd = new Date(aE);

  const opts=timeOpts();
  let html=`<div class="sheet-title">✅ Reserveren</div><div class="sheet-sub">Parkeerplaats ${spotNum}</div>`;
  html+=`<div class="info-row"><span class="info-label">Beschikbaar van</span><span class="info-value">${fmtDT(aS)}</span></div>`;
  html+=`<div class="info-row" style="margin-bottom:16px"><span class="info-label">Beschikbaar tot</span><span class="info-value">${fmtDT(aE)}</span></div>`;
  html+=`<div class="time-picker-row"><div class="time-picker-group"><label class="form-label">Van datum</label><input type="date" class="time-select" id="rFromDate" value="${fmtDate(preStart)}" min="${fmtDate(aS)}" max="${fmtDate(aE)}"></div><div class="time-picker-group"><label class="form-label">Van tijd</label><select class="time-select" id="rFromTime">${opts}</select></div></div>`;
  html+=`<div class="time-picker-row"><div class="time-picker-group"><label class="form-label">Tot datum</label><input type="date" class="time-select" id="rToDate" value="${fmtDate(preEnd)}" min="${fmtDate(aS)}" max="${fmtDate(aE)}"></div><div class="time-picker-group"><label class="form-label">Tot tijd</label><select class="time-select" id="rToTime">${opts}</select></div></div>`;
  html+=`<div class="sheet-actions"><button class="btn" id="confirmResBtn" onclick="confirmRes('${spotId}','${spotNum}','${availId}','${availStart}','${availEnd}')">✅ Bevestigen & Verstuur WhatsApp</button><button class="btn outline" onclick="closeSheet()">Annuleren</button></div>`;
  openSheet(html);
  setVal('rFromTime', `${String(preStart.getHours()).padStart(2,'0')}:00`);
  setVal('rToTime', `${String(preEnd.getHours()).padStart(2,'0')}:00`);
};

window.confirmRes = async function(spotId,spotNum,availId,availStart,availEnd) {
  const start=new Date(`${g('rFromDate')}T${g('rFromTime')}:00`);
  const end=new Date(`${g('rToDate')}T${g('rToTime')}:00`);
  const aS=new Date(availStart),aE=new Date(availEnd);
  if (end<=start){showToast('Eindtijd moet na starttijd zijn','error');return;}
  if (start<aS||end>aE){showToast('Tijden vallen buiten de beschikbaarheidsperiode','error');return;}
  const conflict = Object.values(state.reservations).find(r=>
    r.spotId===spotId && r.status==='active' &&
    new Date(r.start)<end && new Date(r.end)>start
  );
  if (conflict){showToast('Dit tijdslot is al gereserveerd','error');return;}
  setBtnLoading('confirmResBtn', true);
  const id='res_'+uid();
  const data={spotId,availId,reservedBy:state.user.id,start:start.toISOString(),end:end.toISOString(),status:'active'};
  try {
    await set(ref(db,`reservations/${id}`),data);
    state.reservations[id]=data;
    closeSheet(); renderGrid();
    showToast('✅ Gereserveerd!','success');
    sendWA('reserved',spotNum,start,end,state.user.name);
  } catch(e) {
    showToast('Fout bij opslaan. Probeer opnieuw.','error');
    setBtnLoading('confirmResBtn', false);
  }
};

// ── CANCEL ──
window.cancelReservation = async function(resId,spotNum,start,end) {
  if (!confirm('Reservering annuleren?')) return;
  await update(ref(db,`reservations/${resId}`),{status:'cancelled'});
  if (state.reservations[resId]) state.reservations[resId].status='cancelled';
  closeSheet(); renderGrid();
  showToast('Reservering geannuleerd','success');
  sendWA('cancelled',spotNum,new Date(start),new Date(end));
};

window.cancelAvailability = async function(availId,spotNum,start,end) {
  if (!confirm('Beschikbaarheid annuleren? Eventuele reserveringen vervallen ook.')) return;
  for (const [rid,r] of Object.entries(state.reservations)) {
    if (r.availId===availId && r.status==='active') {
      await update(ref(db,`reservations/${rid}`),{status:'cancelled'});
      state.reservations[rid].status='cancelled';
    }
  }
  await update(ref(db,`availability/${availId}`),{status:'cancelled'});
  if (state.availability[availId]) state.availability[availId].status='cancelled';
  closeSheet(); renderGrid();
  showToast('Beschikbaarheid geannuleerd','success');
  sendWA('cancelled',spotNum,new Date(start),new Date(end));
};

// ── WHATSAPP ──
// Strategy: copy message to clipboard, then open the group link
// User arrives in group and pastes — one tap
function sendWA(type,spotNum,start,end,name='') {
  const appUrl = state.config.appUrl;
  const groupLink = state.config.whatsappLink;
  const fmt = dt => dt.toLocaleString('nl-NL',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  let msg='';
  if (type==='available') msg=`🅿️ Parkeerplaats ${spotNum} is beschikbaar gesteld\nVan: ${fmt(start)}\nTot: ${fmt(end)}\n\nReserveer via: ${appUrl}`;
  else if (type==='reserved') msg=`✅ Parkeerplaats ${spotNum} is gereserveerd door ${name}\nVan: ${fmt(start)}\nTot: ${fmt(end)}\n\nBekijk via: ${appUrl}`;
  else msg=`❌ Parkeerplaats ${spotNum} — reservering/beschikbaarheid geannuleerd\nVan: ${fmt(start)}\nTot: ${fmt(end)}\n\nBekijk via: ${appUrl}`;

  window._waPendingMsg = msg;
  window._waGroupLink = groupLink;

  const escaped = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  const html = `
    <div class="sheet-title">📲 Stuur bericht naar groep</div>
    <div class="sheet-sub">Stap 1: Kopieer het bericht. Stap 2: Open de groep en plak.</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:15px;line-height:1.7;margin-bottom:20px;color:var(--text)">
      ${escaped}
    </div>
    <div class="sheet-actions">
      <button class="btn green" style="font-size:18px;padding:20px" onclick="copyWAMsg()">📋 Stap 1 — Kopieer bericht</button>
      <button class="btn" style="font-size:18px;padding:20px;background:#25D366" onclick="openWAGroup()">💬 Stap 2 — Open WhatsApp Groep</button>
      <button class="btn outline" onclick="closeSheet()">Sluiten</button>
    </div>`;
  openSheet(html);
}

window.copyWAMsg = function() {
  const msg = window._waPendingMsg || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg)
      .then(()=>showToast('✅ Gekopieerd! Open nu de groep.','success'))
      .catch(()=>fallbackCopy(msg));
  } else { fallbackCopy(msg); }
};

function fallbackCopy(msg) {
  const ta = document.createElement('textarea');
  ta.value=msg; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('✅ Gekopieerd! Open nu de groep.','success'); }
  catch(e) { showToast('Kopieer het bericht handmatig','error'); }
  document.body.removeChild(ta);
}

window.openWAGroup = function() {
  window.open(window._waGroupLink || state.config.whatsappLink,'_blank');
};

  document.getElementById('bottomSheet').classList.add('active');

let toastTimer;
window.showToast = function(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='toast',3500);

// ── UTILS ──
function timeOpts(){
  let o='';
  for(let h=0;h<24;h++){
    const v=`${String(h).padStart(2,'0')}:00`;
    o+=`<option value="${v}">${v}</option>`;
  }
  return o;
}
function roundSlot(d){return `${String(d.getHours()).padStart(2,'0')}:00`;}
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}

// ── ADMIN ──
window.switchAdminTab = function(tab) {
  document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',['users','spots','config'][i]===tab));
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('admin'+tab[0].toUpperCase()+tab.slice(1)).classList.add('active');
};

function renderAdminUsers() {
  let html=`<button class="btn" style="margin-bottom:16px" onclick="openUserModal()">+ Gebruiker toevoegen</button>`;
  Object.entries(state.users).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([id,u])=>{
    const spots=Object.values(state.spots).filter(s=>s.ownerIds?.split(',').map(x=>x.trim()).includes(id));
    html+=`<div class="list-item"><div class="list-item-info"><div class="list-item-title">${u.name}${u.role==='super'?'<span class="badge super">Super</span>':u.role==='admin'?'<span class="badge admin">Admin</span>':''}${!u.active?'<span class="badge inactive">Inactief</span>':''}</div><div class="list-item-sub">${spots.length?'Plaatsen: '+spots.map(s=>s.number).join(', '):'Geen plaatsen'}</div></div><div class="list-item-actions"><button class="btn sm outline" onclick="openUserModal('${id}')">✏️</button><button class="btn sm ${u.active?'red':'green'}" onclick="toggleUser('${id}',${u.active})">${u.active?'🔒':'🔓'}</button></div></div>`;
  });
  document.getElementById('adminUsers').innerHTML=html;
}

function renderAdminSpots() {
  let html=`<button class="btn" style="margin-bottom:16px" onclick="openSpotModal()">+ Parkeerplaats toevoegen</button>`;
  Object.entries(state.spots).sort((a,b)=>Number(a[1].number)-Number(b[1].number)).forEach(([id,s])=>{
    html+=`<div class="list-item"><div class="list-item-info"><div class="list-item-title">🅿️ ${s.number}</div><div class="list-item-sub">${getOwnerNames(s)}</div></div><div class="list-item-actions"><button class="btn sm outline" onclick="openSpotModal('${id}')">✏️</button></div></div>`;
  });
  document.getElementById('adminSpots').innerHTML=html;
}

function renderAdminConfig() {
  document.getElementById('adminConfig').innerHTML=`
    <label class="form-label">WhatsApp groeplink</label>
    <input class="form-input" id="cfgWA" value="${state.config.whatsappLink||''}">
    <label class="form-label">App URL</label>
    <input class="form-input" id="cfgURL" value="${state.config.appUrl||''}">
    <button class="btn" onclick="saveConfig()">💾 Opslaan</button>`;
}

window.saveConfig = async function() {
  const c={whatsappLink:g('cfgWA'),appUrl:g('cfgURL')};
  await set(ref(db,'config'),c);
  state.config=c;
  showToast('Instellingen opgeslagen','success');
};

window.openUserModal = function(userId=null) {
  document.getElementById('userModalTitle').textContent = userId?'Gebruiker bewerken':'Gebruiker toevoegen';
  document.getElementById('editUserId').value=userId||'';
  if (userId&&state.users[userId]) {
    const u=state.users[userId];
    document.getElementById('editUserName').value=u.name;
    document.getElementById('editUserPin').value=u.pin;
    document.getElementById('editUserRole').value=u.role==='super'?'admin':u.role;
  } else {
    document.getElementById('editUserName').value='';
    document.getElementById('editUserPin').value='';
    document.getElementById('editUserRole').value='neighbor';
  }
  document.getElementById('userModal').classList.add('active');
};

window.saveUser = async function() {
  const id=g('editUserId')||'u_'+uid();
  const name=document.getElementById('editUserName').value.trim();
  const pin=document.getElementById('editUserPin').value.trim();
  const role=g('editUserRole');
  if (!name||!/^\d{4}$/.test(pin)){showToast('Vul naam en 4-cijferige PIN in','error');return;}
  const existing=state.users[id];
  const data={name,pin,role,active:existing?.active??true};
  await set(ref(db,`users/${id}`),data);
  state.users[id]=data;
  closeModal('userModal');
  renderAdminUsers();
  populateLoginSelect();
  showToast('Gebruiker opgeslagen','success');
};

window.toggleUser = async function(id,isActive) {
  await update(ref(db,`users/${id}`),{active:!isActive});
  state.users[id].active=!isActive;
  renderAdminUsers();
  showToast(isActive?'Gebruiker gedeactiveerd':'Gebruiker geactiveerd','success');
};

window.openSpotModal = function(spotId=null) {
  document.getElementById('spotModalTitle').textContent=spotId?'Parkeerplaats bewerken':'Parkeerplaats toevoegen';
  document.getElementById('editSpotId').value=spotId||'';
  const sel=document.getElementById('editSpotOwners');
  sel.innerHTML='';
  Object.entries(state.users).filter(([,u])=>u.active).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([id,u])=>{
    const opt=document.createElement('option');
    opt.value=id; opt.textContent=u.name; sel.appendChild(opt);
  });
  if (spotId&&state.spots[spotId]) {
    document.getElementById('editSpotNumber').value=state.spots[spotId].number;
    const owners=(state.spots[spotId].ownerIds||'').split(',').map(x=>x.trim());
    Array.from(sel.options).forEach(o=>o.selected=owners.includes(o.value));
  } else {
    document.getElementById('editSpotNumber').value='';
  }
  document.getElementById('spotModal').classList.add('active');
};

window.saveSpot = async function() {
  const id=g('editSpotId')||'s_'+uid();
  const number=document.getElementById('editSpotNumber').value.trim();
  const sel=document.getElementById('editSpotOwners');
  const ownerIds=Array.from(sel.selectedOptions).map(o=>o.value).join(',');
  if (!number){showToast('Vul een nummer in','error');return;}
  const data={number,ownerIds};
  await set(ref(db,`spots/${id}`),data);
  state.spots[id]=data;
  closeModal('spotModal');
  renderAdminSpots(); renderGrid();
  showToast('Parkeerplaats opgeslagen','success');
};

// ── LOADING HELPER ──
function setBtnLoading(id, loading) {
  const btn = document.getElementById(id);
  if (!btn) return;
  if (loading) {
    btn._origText = btn.innerHTML;
    btn.innerHTML = '<span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle"></span> Bezig...';
    btn.disabled = true;
  } else {
    btn.innerHTML = btn._origText || btn.innerHTML;
    btn.disabled = false;
  }
}

// ── FIREBASE KEEPALIVE ──
// Ping every 4 minutes to keep connection warm
function startKeepalive() {
  setInterval(async () => {
    try { await get(ref(db, 'config/appUrl')); } catch(e) {}
  }, 4 * 60 * 1000);
}

init().then(startKeepalive);
</script>
